<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloodSafe IoT - Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🩸 BloodSafe IoT</div>
    <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="inventory.html">Inventory</a>
      <a href="alerts.html">Alerts</a>
      <span id="userDisplay" class="user-badge">👤 Officer</span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="dashboard">
    <div id="alertBanner" class="alert-banner normal">
      ✅ ALL SYSTEMS NORMAL
    </div>

    <div class="stats-grid">
      <div class="stat-card temp-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="tempDisplay">--°C</div>
        <div class="stat-status" id="tempStatus">Loading...</div>
      </div>
      <div class="stat-card stock-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">Total Stock</div>
        <div class="stat-value" id="stockDisplay">--</div>
        <div class="stat-status" id="stockStatus">Loading...</div>
      </div>
      <div class="stat-card expiry-card">
        <div class="stat-icon">⏰</div>
        <div class="stat-label">Near Expiry</div>
        <div class="stat-value" id="expiryDisplay">--</div>
        <div class="stat-status" id="expiryStatus">Loading...</div>
      </div>
      <div class="stat-card status-card">
        <div class="stat-icon">📊</div>
        <div class="stat-label">System Status</div>
        <div class="stat-value" id="systemStatus">--</div>
        <div class="stat-status">Last Update: <span id="lastUpdate">--</span></div>
      </div>
    </div>

    <div class="section">
      <h2>Blood Inventory Overview</h2>
      <div class="blood-grid" id="bloodGrid"></div>
    </div>

    <div class="section">
      <h2>Quick Actions</h2>
      <div class="action-buttons">
        <button onclick="updateStock(10)" class="action-btn">📦 Use 10 Units</button>
        <button onclick="updateStock(-5)" class="action-btn">📥 Restock 5 Units</button>
        <button onclick="refreshData()" class="action-btn">🔄 Refresh</button>
        <button onclick="simulateCritical()" class="action-btn danger">🚨 Critical Alert</button>
      </div>
    </div>
  </main>

  <script src="script.js">
   const SUPABASE_URL = "https://jqdnxrmulgndvcotnfmu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxZG54cm11bGduZHZjb3RuZm11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTQ2MDIsImV4cCI6MjA5Nzg5MDYwMn0.PJRHVVdtK56rDKJxnQH-grwD0M8SaUrJZL9qUdhnSzg";

async function fetchData() {
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/bloodbank?select=*&order=id.desc&limit=1",
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );
    const data = await res.json();

    if (data && data.length > 0) {
      const temp = parseFloat(data[0].temperature) || 0;
      const stock = parseInt(data[0].blood_stock) || 0;
      updateDisplay(temp, stock);

      const now = new Date();
      document.getElementById("lastUpdated").textContent =
        "Last updated: " + now.toLocaleTimeString();
      document.getElementById("loadingBox").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    }
  } catch (e) {
    document.getElementById("loadingBox").innerHTML =
      "<div style='color:#E53935;'>⚠️ Could not load data.<br><br><button onclick='fetchData()' style='background:#E53935;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;'>Try Again</button></div>";
  }
}

function updateDisplay(temp, stock) {
  const tempValEl = document.getElementById("tempValue");
  const tempStatusEl = document.getElementById("tempStatus");
  const tempCard = document.getElementById("tempCard");
  tempValEl.textContent = temp.toFixed(1) + "°C";

  if (temp > 8) {
    setCard(tempCard, tempValEl, tempStatusEl, "red", "🔴 CRITICAL - TOO HIGH");
  } else if (temp < 2) {
    setCard(tempCard, tempValEl, tempStatusEl, "yellow", "🟡 WARNING - TOO LOW");
  } else {
    setCard(tempCard, tempValEl, tempStatusEl, "green", "🟢 NORMAL");
  }

  const stockValEl = document.getElementById("stockValue");
  const stockStatusEl = document.getElementById("stockStatus");
  const stockCard = document.getElementById("stockCard");
  stockValEl.textContent = stock + " Units";

  if (stock < 15) {
    setCard(stockCard, stockValEl, stockStatusEl, "red", "🔴 CRITICALLY LOW");
  } else if (stock < 30) {
    setCard(stockCard, stockValEl, stockStatusEl, "yellow", "🟡 STOCK LOW");
  } else {
    setCard(stockCard, stockValEl, stockStatusEl, "green", "🟢 SUFFICIENT");
  }

  const banner = document.getElementById("alertBanner");
  banner.className = "alert-banner show";

  if (temp > 8) {
    banner.classList.add("critical");
    document.getElementById("alertIcon").textContent = "🚨";
    document.getElementById("alertTitle").textContent = "CRITICAL TEMPERATURE ALERT";
    document.getElementById("alertDesc").textContent =
      "Temperature " + temp.toFixed(1) + "°C exceeds safe limit! Check storage immediately.";
  } else if (stock < 30) {
    banner.classList.add("warning");
    document.getElementById("alertIcon").textContent = "⚠️";
    document.getElementById("alertTitle").textContent = "LOW BLOOD STOCK WARNING";
    document.getElementById("alertDesc").textContent =
      "Only " + stock + " units remaining. Restock required soon.";
  } else {
    banner.classList.add("normal");
    document.getElementById("alertIcon").textContent = "✅";
    document.getElementById("alertTitle").textContent = "ALL SYSTEMS NORMAL";
    document.getElementById("alertDesc").textContent =
      "Temperature and blood stock are within safe limits.";
  }

  const overall = document.getElementById("overallStatus");
  if (temp > 8) {
    overall.textContent = "🔴 CRITICAL ALERT";
    overall.style.color = "#E53935";
  } else if (stock < 30) {
    overall.textContent = "🟡 WARNING";
    overall.style.color = "#FFC107";
  } else {
    overall.textContent = "🟢 ALL NORMAL";
    overall.style.color = "#4CAF50";
  }
}

function setCard(card, valEl, statusEl, color, text) {
  card.className = "card " + color;
  valEl.className = "card-value " + color;
  statusEl.className = "card-status " + color;
  statusEl.textContent = text;
}

fetchData();
setInterval(fetchData, 5000);
  </script>
</body>
</html>
