<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloodSafe IoT - Reports</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">🩸 BloodSafe IoT</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="inventory.html">Inventory</a>
            <a href="alerts.html">Alerts</a>
            <a href="reports.html" class="active">Reports</a>
            <span id="userDisplay" class="user-badge">👤 Officer</span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="dashboard">
        <h1>📊 Reports & Analytics</h1>
        
        <div class="section">
            <h2>Temperature History</h2>
            <div id="tempChart" style="height:300px; background:#f8f9fa; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#888;">
                📈 Temperature chart will appear here
            </div>
        </div>

        <div class="section">
            <h2>Stock Trends</h2>
            <div id="stockChart" style="height:300px; background:#f8f9fa; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#888;">
                📊 Stock chart will appear here
            </div>
        </div>

        <div class="section">
            <h2>Blood Group Distribution</h2>
            <div id="bloodChart" style="height:300px; background:#f8f9fa; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#888;">
                🩸 Blood group distribution chart will appear here
            </div>
        </div>

        <div class="section">
            <div class="action-buttons">
                <button onclick="window.location.href='index.html'" class="action-btn">📊 Back to Dashboard</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
