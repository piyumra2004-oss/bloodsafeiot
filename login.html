<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloodSafe IoT - Login</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">🩸 BloodSafe IoT</div>
                <div class="hospital">Suwa Setha Hospital</div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required />
                </div>
                <div id="loginError" class="login-error">Invalid username or password</div>
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
            
            <div class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p>Officer: <code>officer1</code> / <code>pass123</code></p>
                <p>Manager: <code>manager1</code> / <code>pass123</code></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            if ((username === 'officer1' && password === 'pass123') ||
                (username === 'manager1' && password === 'pass123')) {
                localStorage.setItem('user', JSON.stringify({ 
                    username: username,
                    role: username === 'manager1' ? 'MANAGER' : 'OFFICER'
                }));
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
